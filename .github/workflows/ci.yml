name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm exec tsc --noEmit

      - name: Check server-only imports
        run: bash scripts/check-server-imports.sh

      - name: Build metadata
        run: node scripts/build-meta.mjs

      - name: Build
        run: pnpm next build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || '' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || '' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
          OPENAI_MODEL: gpt-4o
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || '' }}
          WECHAT_VIDEO_ACCESS_TOKEN: ${{ secrets.WECHAT_VIDEO_ACCESS_TOKEN || '' }}
          WECHAT_APP_ID: ${{ secrets.WECHAT_APP_ID || '' }}
          WECHAT_APP_SECRET: ${{ secrets.WECHAT_APP_SECRET || '' }}
          DOUYIN_CLIENT_KEY: ${{ secrets.DOUYIN_CLIENT_KEY || '' }}
          DOUYIN_CLIENT_SECRET: ${{ secrets.DOUYIN_CLIENT_SECRET || '' }}

      - name: Audit bundle for secret leakage
        run: bash scripts/audit-bundle-secrets.sh

      - name: Install tsx for smoke tests
        run: pnpm add -D tsx

      - name: Start dev server for smoke tests
        run: |
          pnpm next start -p 3000 &
          sleep 5
          for i in {1..20}; do
            if curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "✅ Server ready"
              break
            fi
            echo "⏳ Waiting for server... ($i)"
            sleep 2
          done

      - name: Run smoke tests
        run: |
          BASE_URL=http://localhost:3000 pnpm tsx tests/e2e/routes.spec.ts
          BASE_URL=http://localhost:3000 pnpm tsx tests/e2e/scripts.spec.ts
          BASE_URL=http://localhost:3000 pnpm tsx tests/e2e/knowledge.spec.ts
          BASE_URL=http://localhost:3000 pnpm tsx tests/e2e/topics.spec.ts
        continue-on-error: false

      - name: Stop server
        if: always()
        run: kill $(lsof -t -i:3000) 2>/dev/null || true
